<meta charset="utf-8">
<title>Kalshi BTC 15-Min Dashboard</title>
<link rel="stylesheet" href="style.css">
<div class="wrap">
  <header class="top">
    <div>
      <h1>Kalshi BTC 15-Minute Market Tracker</h1>
      <div class="subtitle">KXBTC15M &middot; Kalshi sampled about every 2 minutes; page checks for updates every minute</div>
    </div>
    <div class="updated" id="updated">loading&hellip;</div>
  </header>

  <nav class="tabs" id="tabs">
    <button type="button" class="tab active" data-tab="live">Live</button>
    <button type="button" class="tab" data-tab="insights">Insights</button>
    <button type="button" class="tab" data-tab="calculator">Calculator</button>
  </nav>

  <div id="tab-live" class="tab-panel"></div>
  <div id="tab-insights" class="tab-panel" hidden></div>
  <div id="tab-calculator" class="tab-panel" hidden></div>

  <footer>
    Data from Kalshi's public market API and CoinGecko. Educational tracker, not trading advice.
    <a href="https://github.com/joseenriquesotof/kbtctraker" target="_blank" rel="noopener">source</a>
  </footer>
</div>
<div class="tooltip" id="tooltip"></div>
<script src="app.js"></script>
