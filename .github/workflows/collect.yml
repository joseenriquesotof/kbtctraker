name: Collect Kalshi BTC 15-min data

on:
  schedule:
    # GitHub's cron floor is 5 min (and it lags under load). To get ~40s
    # resolution the job loops internally, sampling several times per run
    # while the next scheduled run queues up behind it.
    # Avoid the exact 0/5/10... minute marks, where GitHub's scheduler is
    # busiest and scheduled runs are more likely to be delayed or dropped.
    - cron: "2-59/5 * * * *"
  workflow_dispatch:
    inputs:
      samples:
        description: "Snapshots to take this run"
        default: "6"
      interval:
        description: "Seconds between snapshots"
        default: "40"

permissions:
  contents: write

concurrency:
  group: kalshi-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      # Defaults for scheduled runs: 6 samples, 40s apart -> ~200s of sleeps,
      # leaving headroom under the 5-min cron cadence for checkout/setup/fetch
      # overhead so runs don't back up behind each other (concurrency below
      # queues rather than overlaps, but a run regularly exceeding 5 min would
      # still make the effective cadence drift later over time).
      SAMPLES: ${{ github.event.inputs.samples || '6' }}
      INTERVAL: ${{ github.event.inputs.interval || '40' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect snapshots on a loop
        run: |
          for i in $(seq 1 "$SAMPLES"); do
            echo "--- sample $i/$SAMPLES ---"
            python collector/collect.py || echo "collect failed (continuing)"
            if [ "$i" -lt "$SAMPLES" ]; then
              sleep "$INTERVAL"
            fi
          done

      - name: Build dashboard data
        run: python collector/aggregate.py

      - name: Commit and push if changed
        run: |
          git config user.name "kbtctraker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/raw docs/data.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "data: snapshots $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          for i in 1 2 3 4; do
            git pull --rebase origin "${GITHUB_REF_NAME}" && git push origin "HEAD:${GITHUB_REF_NAME}" && break
            sleep $((i * 3))
          done
